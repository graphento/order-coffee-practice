<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Заказ кофе</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <form>
      <div>
        <button type="button" class="add-button" id="add-button">
          + Добавить напиток
        </button>
      </div>
      <div style="margin-top: 30px">
        <button type="submit" class="submit-button" id="submit-button">
          Готово
        </button>
      </div>
      <template id="beverage-template">
        <fieldset class="beverage">
          <h4 class="beverage-count">Напиток №1</h4>
          <label class="field">
            <span class="label-text">Я буду</span>
            <select>
              <option value="espresso">Эспрессо</option>
              <option value="capuccino" selected>Капучино</option>
              <option value="cacao">Какао</option>
            </select>
          </label>
          <div class="field">
            <span class="checkbox-label">Сделайте напиток на</span>
            <label class="checkbox-field">
              <input type="radio" name="milk" value="usual" checked />
              <span>обычном молоке</span>
            </label>
            <label class="checkbox-field">
              <input type="radio" name="milk" value="no-fat" />
              <span>обезжиренном молоке</span>
            </label>
            <label class="checkbox-field">
              <input type="radio" name="milk" value="soy" />
              <span>соевом молоке</span>
            </label>
            <label class="checkbox-field">
              <input type="radio" name="milk" value="coconut" />
              <span>кокосовом молоке</span>
            </label>
          </div>
          <div class="field">
            <span class="checkbox-label">Добавьте к напитку:</span>
            <label class="checkbox-field">
              <input type="checkbox" name="options" value="whipped cream" />
              <span>взбитых сливок</span>
            </label>
            <label class="checkbox-field">
              <input type="checkbox" name="options" value="marshmallow" />
              <span>зефирок</span>
            </label>
            <label class="checkbox-field">
              <input type="checkbox" name="options" value="chocolate" />
              <span>шоколад</span>
            </label>
            <label class="checkbox-field">
              <input type="checkbox" name="options" value="cinnamon" />
              <span>корицу</span>
            </label>
          </div>
          <div class="field">
            <span>И еще вот что</span><br />
            <textarea class="wishes"></textarea><br />
            <span></span>
          </div>
        </fieldset>
      </template>
    </form>

    <input type="checkbox" id="lightbox-toggle" class="hidden" />
    <div class="lightbox-overlay">
      <div class="lightbox">
        <div id="lightbox-message">Заказ принят!</div>
        <label for="lightbox-toggle" class="lightbox-close">X</label>
        <br />
        <form id="order-submission">
          <label>
            Выберите время заказа
            <input
              type="time"
              name="order-time"
              id="order-time-input"
            /> </label
          ><br />
          <label
            >Пожелания<br />
            <textarea></textarea>
          </label>
          <span id="order-submission-result"></span>
          <input type="submit" value="Оформить" />
        </form>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
